name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  skill:
    runs-on: ubuntu-latest
    env:
      SKILL: .claude/skills/hostinger-mcp/SKILL.md
    steps:
      - uses: actions/checkout@v4

      - name: SKILL frontmatter lint
        run: |
          python3 - <<'PY'
          import re, pathlib, os
          p = pathlib.Path(os.environ["SKILL"]).read_text()
          m = re.match(r'^---\n(.*?)\n---\n', p, re.S)
          assert m, "missing frontmatter"
          fm = m.group(1)
          for k in ("name", "description", "version"):
              mm = re.search(rf'^{k}:\s*(.+)$', fm, re.M)
              assert mm and mm.group(1).strip(), f"frontmatter missing non-empty {k}"
          print("frontmatter OK")
          PY

      - name: Reference links exist
        run: |
          python3 - <<'PY'
          import re, pathlib, os
          skill = pathlib.Path(os.environ["SKILL"])
          base = skill.parent
          refs = re.findall(r'references/[A-Za-z0-9_-]+\.md', skill.read_text())
          missing = [r for r in set(refs) if not (base / r).exists()]
          assert not missing, f"missing referenced files: {missing}"
          print(f"references OK ({len(set(refs))} linked)")
          PY

      - name: No-leak guard
        run: |
          # "digitizer-skills" (public marketplace) and the "Digitizers/" org prefix are
          # allowed. Strip those exact tokens, then re-scan the residue — so a line like
          # "Digitizers/digitizer-os" still fails on its remaining "digitizer-os" part,
          # unlike a line-level grep -v exemption which would wave the whole line through.
          if grep -rniE "digitizer|דיגיטייזר|Ben/Avi" .claude/ | sed -E 's/(^|[^A-Za-z0-9-])digitizer-skills([^A-Za-z0-9-]|$)/\1\2/g; s/(^|[^A-Za-z0-9])Digitizers\//\1/g' | grep -iE "digitizer|דיגיטייזר|Ben/Avi"; then
            echo "::error::studio framing / personal names in the skill payload — keep .claude/ generic"; exit 1
          fi
          if grep -rniE "Ben/Avi|benkalsky" README.md; then
            echo "::error::personal name in README — use the studio brand, not personal names"; exit 1
          fi
          if grep -rniE "(api[_-]?key|bearer|secret|password|token)[\"'[:space:]=:]+[A-Za-z0-9/_-]{24,}" .claude/ \
             | grep -viE "your-|YOUR_|ACCT_[AB]|example|<|\$\{|placeholder|HOSTINGER_API_TOKEN"; then
            echo "::error::possible real secret found"; exit 1
          fi
          echo "no-leak guard passed"
